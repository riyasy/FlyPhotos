name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: x64
            rid: win-x64
            vcpkg-triplet: x64-windows
          - runner: windows-11-arm
            platform: ARM64
            rid: win-arm64
            vcpkg-triplet: arm64-windows

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.platform }})

    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg_cache,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Cache vcpkg binary cache (small, compressed packages only)
      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: vcpkg_cache
          key: vcpkg-${{ matrix.vcpkg-triplet }}-${{ hashFiles('Src/build_libheif/vcpkg.json', 'Src/build_libheif/vcpkg-configuration.json') }}

      # Install vcpkg dependencies (manifest mode)
      - name: Install vcpkg dependencies
        working-directory: Src/build_libheif
        run: |
          vcpkg install --triplet ${{ matrix.vcpkg-triplet }} --x-manifest-root=.

      # Build native projects
      - name: Build FlyNativeLib
        working-directory: Src/FlyNativeLib
        run: |
          msbuild FlyNativeLib.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      - name: Build FlyNativeLibHeif
        working-directory: Src/FlyNativeLibHeif
        run: |
          msbuild FlyNativeLibHeif.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      - name: Build FlyContextMenuHelper
        working-directory: Src/FlyContextMenuHelper
        run: |
          msbuild FlyContextMenuHelper.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      # Copy native outputs
      - name: Copy native binaries
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $triplet  = "${{ matrix.vcpkg-triplet }}"

          $externalDir = "Src/FlyPhotos/External/$platform"

          New-Item -ItemType Directory -Path $externalDir -Force | Out-Null

          Get-ChildItem $externalDir -File -ErrorAction SilentlyContinue |
            Remove-Item -Force

          Copy-Item "Src/FlyNativeLib/$platform/Release/FlyNativeLib.dll" `
            -Destination $externalDir -Force

          Copy-Item "Src/FlyNativeLibHeif/$platform/Release/FlyNativeLibHeif.dll" `
            -Destination $externalDir -Force

          Copy-Item "Src/FlyContextMenuHelper/$platform/Release/FlyContextMenuHelper.exe" `
            -Destination $externalDir -Force

          $vcpkgBinDir = "Src/build_libheif/vcpkg_installed/$triplet/bin"

          if (Test-Path $vcpkgBinDir) {
            Get-ChildItem "$vcpkgBinDir/*.dll" |
              Copy-Item -Destination $externalDir -Force
          }
  
      # # Publish and Package MSIX
      # - name: Publish and package MSIX
      #   working-directory: Src
      #   run: |
      #     dotnet publish FlyPhotos/FlyPhotos.csproj `
      #       -c Release `
      #       -r ${{ matrix.rid }} `
      #       /p:Platform=${{ matrix.platform }} `
      #       /p:WindowsPackageType=MSIX `
      #       /p:GenerateAppxPackageOnBuild=true `
      #       /p:AppxPackageSigningEnabled=false
    
      # - name: Upload MSIX artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: FlyPhotos-${{ matrix.platform }}-msix
      #     path: Src/FlyPhotos/AppPackages/**/*.msix

      # Publish
      - name: Publish
        working-directory: Src
        run: |
          dotnet publish FlyPhotos/FlyPhotos.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            /p:Platform=${{ matrix.platform }} `
            -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlyPhotos-${{ matrix.platform }}
          path: Src/publish/${{ matrix.rid }}/

